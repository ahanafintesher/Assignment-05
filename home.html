<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind & daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="navbar bg-white px-4 md:px-6 py-2 shadow-sm border-b border-gray-200">
        <!-- Left side -->
        <div class="flex-1">
          <div class="flex items-center gap-2 md:gap-3">
            <img
              src="./assets/github-logo.png"
              alt="GitHub Logo"
              class="w-7 h-7 md:w-8 md:h-8"
            />
            <span class="text-lg md:text-3xl font-bold text-gray-800">
              GitHub Issues Tracker
            </span>
          </div>
        </div>

        <!-- Right side - hidden on mobile -->
        <div class="hidden md:flex items-center gap-4">
          <label
            class="input input-bordered flex items-center gap-2 w-72 h-11 bg-white rounded-md border-gray-300"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 16 16"
              fill="currentColor"
              class="h-4 w-4 text-gray-400"
            >
              <path
                fill-rule="evenodd"
                d="M9.965 11.026a5.5 5.5 0 1 1 1.06-1.06l3.755 3.754a.75.75 0 1 1-1.06 1.06l-3.755-3.754ZM11 6.5a4.5 4.5 0 1 0-9 0 4.5 4.5 0 0 0 9 0Z"
                clip-rule="evenodd"
              />
            </svg>
            <input
              type="text"
              id="search-input"
              class="grow text-sm"
              placeholder="Search issues..."
            />
          </label>

          <button
            onclick="searchIssue()"
            class="btn bg-violet-600 hover:bg-violet-700 text-white border-none px-6 rounded-md"
          >
            <span><i class="fa-solid fa-magnifying-glass"></i> Search Issue</span>
          </button>
        </div>
      </div>

      <!-- Mobile search bar -->
      <div class="md:hidden px-4 py-3 bg-white border-b border-gray-200 flex gap-2">
        <input
          type="text"
          id="search-input-mobile"
          class="input input-bordered grow h-10 text-sm rounded-md"
          placeholder="Search issues..."
        />
        <button
          onclick="searchIssue()"
          class="btn bg-violet-600 hover:bg-violet-700 text-white border-none px-4 rounded-md"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </header>

    <!-- Buttons Section -->
    <section class="mt-6 md:mt-[60px] w-11/12 mx-auto shadow p-4 md:p-6 mb-4">
      <button class="btn btn-primary ml-2" id="all-btn">All</button>
      <button class="btn btn-base ml-2" id="open-btn">Open</button>
      <button class="btn btn-base ml-2" id="close-btn">Close</button>
    </section>

    <!-- Issue count section -->
    <section
      class="w-11/12 mx-auto shadow p-4 md:p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-3"
    >
      <div class="flex gap-2 items-center">
        <img class="h-8 w-8" src="./assets/Aperture.png" alt="" />
        <div>
          <h2 class="text-xl font-semibold">
            <span id="issue-count">0</span> Issues
          </h2>
          <p class="text-[#64748B] text-sm md:text-lg">
            Track and manage your project issues
          </p>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <div class="flex items-center gap-1">
          <div class="h-3 w-3 bg-[#00A96E] rounded-full"></div>
          <div class="text-sm font-medium">Open</div>
        </div>
        <div class="flex items-center gap-1">
          <div class="h-3 w-3 bg-[#A855F7] rounded-full"></div>
          <div class="text-sm font-medium">Close</div>
        </div>
      </div>
    </section>

    <!-- Loading Spinner -->
    <div id="spinner" class="flex justify-center items-center py-20">
      <span class="loading loading-spinner loading-lg text-violet-600"></span>
    </div>

    <!-- all section -->
    <section
      id="all-section"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 w-11/12 mx-auto gap-4 pb-10"
    ></section>

    <!-- modal section -->
    <section>
      <div
        id="modal"
        class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4"
      >
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl">
          <h2
            id="modal-title"
            class="text-gray-900 font-bold text-lg mb-2"
          ></h2>

          <div class="flex flex-wrap items-center gap-2 mb-3">
            <span
              class="bg-green-100 text-green-600 text-xs font-bold px-3 py-1 rounded-full"
              >Opened</span
            >
            <span id="modal-author" class="text-gray-400 text-xs"></span>
            <span id="modal-date" class="text-gray-400 text-xs"></span>
          </div>

          <div id="modal-labels" class="flex flex-wrap gap-2 mb-3"></div>

          <p id="modal-description" class="text-gray-500 text-sm mb-4"></p>

          <div class="bg-gray-50 rounded-xl p-4 flex gap-8 mb-4">
            <div>
              <p class="text-gray-400 text-xs mb-1">Assignee:</p>
              <p id="modal-assignee" class="text-gray-800 font-medium text-sm"></p>
            </div>
            <div>
              <p class="text-gray-400 text-xs mb-1">Priority:</p>
              <span
                id="modal-priority"
                class="bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full"
              ></span>
            </div>
          </div>

          <div class="flex justify-end">
            <button
              onclick="closeModal()"
              class="bg-purple-600 text-white text-sm px-5 py-2 rounded-xl"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </section>

    <script src="./script/home.js"></script>
  </body>
</html>
