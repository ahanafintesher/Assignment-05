<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

    <!-- font awesome cdn -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind & daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-[740px] max-w-[520px] bg-base-100 shadow-md mx-auto">

    <div>
        <div class="logo w-[100px] mx-auto pt-[80px] text-center">
            <img class="mb-6" src="./assets/github-logo.png" alt="">
        </div>



        <div class=" text-center">
            <h2 class="font-semibold text-2xl whitespace-nowrap mb-1">GitHub Issues Tracker</h2>
            <p class="text-[#64748B] text-sm">Sign in to manage your issues</p>
        </div>
    </div>

    <div class="form  pt-8 ">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-semibold">Username</label>
                    <input id="username" type="text" class="input rounded-full border-none bg-base-200"
                        placeholder="Enter Username" />

                    <p class="text-primary">Default: admin</p>

                    <br>

                    <label class="label text-neutral font-semibold">Password</label>
                    <input id="password" type="password" class="input rounded-full border-none bg-base-200"
                        placeholder="Enter Password" />
                    <p class="text-primary">Default: admin123</p>
                     <button id="login-btn" class="btn btn-primary rounded-xl mt-4 ">Sign In</button>

                   

                </fieldset>

                 <div class="relative flex items-center py-5 mb-6">
                        <div class="flex-grow border-t border-gray-300"></div>
                        <span class="flex-shrink mx-4 text-gray-400 text-sm font-medium uppercase">OR</span>
                        <div class="flex-grow border-t border-gray-300"></div>
                </div>


         <p class="text-sm font-thin text-center">Demo Credentials:</p>
                
                <div class="text-center text-[16px] bg-base-200">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
              
            </div>
             
        </div>

        
                
        <script src="./script/login.js"></script>
</body>

</html>
